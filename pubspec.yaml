name: pokemon_favorites
description: "Pokédex — Encuentra y guarda tus Pokémon favoritos"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Networking
  dio: ^5.4.0

  # Routing
  go_router: ^17.0.0

  # Code generation annotations
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # Functional programming
  dartz: ^0.10.1

  # Value equality
  equatable: ^2.0.5

  # Images
  cached_network_image: ^3.3.1

  # UI
  shimmer: ^3.0.0

  # SVG support
  flutter_svg: ^2.0.10+1

  # Typography
  google_fonts: ^8.0.0

  # Local storage
  shared_preferences: ^2.2.2

  # Internationalization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.12.0
  riverpod_generator: ^4.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0

  # Asset generation
  flutter_gen_runner: ^5.13.0

  # Testing
  mocktail: ^1.0.3

  # App icons
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/placeholders/loader.png"
  adaptive_icon_background: "#EF5350"
  adaptive_icon_foreground: "assets/placeholders/loader.png"
  web:
    generate: true
    image_path: "assets/placeholders/loader.png"
    background_color: "#EF5350"
    theme_color: "#EF5350"
  macos:
    generate: true
    image_path: "assets/placeholders/loader.png"
  windows:
    generate: true
    image_path: "assets/placeholders/loader.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/placeholders/
    - assets/placeholders/
    - assets/icons/
    - assets/icons/elements/

flutter_gen:
  output: lib/core/gen/
  line_length: 80
  integrations:
    flutter_svg: true
