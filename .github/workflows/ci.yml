name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed / json_serializable / go_router)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Filter generated files from coverage
        run: |
          # Instalar lcov para filtrar y generar HTML
          sudo apt-get install -y lcov

          # Excluir archivos generados (.g.dart, .freezed.dart)
          lcov \
            --remove coverage/lcov.info \
            '**/*.g.dart' \
            '**/*.freezed.dart' \
            --output-file coverage/lcov_clean.info \
            --ignore-errors unused

          # Mostrar resumen en consola
          lcov --summary coverage/lcov_clean.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov_clean.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate HTML report (artifact)
        run: |
          genhtml coverage/lcov_clean.info \
            --output-directory coverage/html \
            --title "Pokemon Favorites - Coverage"

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/
          retention-days: 30
